version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PG_HOST=db
      - PG_PORT=5432
      - PG_DATABASE=barberqueue
      - PG_USER=postgres
      - PG_PASSWORD=supersecurepassword123
      - JWT_SECRET=your_super_secret_jwt_key_for_production
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=barberqueue
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=supersecurepassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
